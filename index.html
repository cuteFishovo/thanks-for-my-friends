<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>致亲爱的朋友们 | 感恩相遇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字干扰美观，不影响阅读 */
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0e1a2a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'SF Pro Text', '微软雅黑', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            cursor: default;
        }

        /* 动态粒子背景 + 梦幻光晕 */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 主卡片容器 */
        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 780px;
            width: 90%;
            margin: 2rem auto;
            padding: 3rem 2rem;
            background: rgba(20, 30, 45, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
            transition: transform 0.3s ease;
            animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .glass-card:hover {
            transform: scale(1.01);
            background: rgba(20, 30, 45, 0.65);
            border-color: rgba(255, 215, 150, 0.4);
        }

        /* 标题区域 */
        .hero-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero-title h1 {
            font-size: 3.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFE6C7, #FFB347, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(255, 180, 60, 0.3);
            letter-spacing: -0.5px;
            word-break: keep-all;
        }

        .sub-grace {
            font-size: 1.25rem;
            color: rgba(255, 245, 220, 0.85);
            margin-top: 0.8rem;
            font-style: italic;
            border-top: 1px dashed rgba(255, 200, 150, 0.4);
            display: inline-block;
            padding-top: 0.8rem;
            backdrop-filter: blur(2px);
        }

        /* 主文案区域 - 完全保留原始文字，无任何改动 */
        .message-core {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin: 2rem 0;
            backdrop-filter: blur(4px);
            border-left: 4px solid #ffb347;
            transition: all 0.2s;
        }

        .message-core p {
            font-size: 1.18rem;
            line-height: 1.65;
            color: #f3eee8;
            font-weight: 400;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            white-space: pre-line;
        }

        .message-core .heartfelt {
            font-size: 1.08rem;
            margin-top: 1.2rem;
            color: #ffddb0;
            text-align: right;
            font-family: monospace;
        }

        /* 署名感谢 */
        .thanks-block {
            text-align: center;
            margin: 2rem 0 1rem;
        }

        .thanks-block .big-thanks {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(120deg, #FFD194, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }

        .small-sign {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #b9c7d9;
            opacity: 0.8;
        }

        /* 左下音量控件 */
        .volume-control {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            background: rgba(15, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 16px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 200, 120, 0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .volume-control:hover {
            background: rgba(25, 35, 55, 0.85);
            border-color: #ffb347;
        }

        .volume-icon {
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            color: #ffcf9a;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 4px;
            background: rgba(255, 215, 160, 0.4);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffbc6e;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 6px #ffaa44;
            cursor: pointer;
            transition: 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #ffaa44;
        }

        .volume-value {
            font-size: 0.75rem;
            color: #f0e2cf;
            min-width: 38px;
            font-weight: 500;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 20px;
            text-align: center;
        }

        /* 优雅滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141e2c;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb34780;
            border-radius: 8px;
        }

        /* 移动端适应 */
        @media (max-width: 600px) {
            .glass-card {
                padding: 1.8rem 1.2rem;
            }
            .hero-title h1 {
                font-size: 2.2rem;
            }
            .message-core p {
                font-size: 0.98rem;
            }
            .volume-control {
                bottom: 16px;
                left: 16px;
                padding: 5px 12px;
                gap: 8px;
            }
            input[type="range"] {
                width: 90px;
            }
        }

        /* 轻柔入场动画 */
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 爱心闪烁点缀 */
        .spark {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, #ffbf6e, transparent);
            border-radius: 50%;
            opacity: 0;
            animation: sparkFade 2s ease-out forwards;
        }

        @keyframes sparkFade {
            0% { opacity: 0.6; transform: scale(0); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        
        /* 音频后备隐藏区域，无交互影响 */
        .audio-init-helper {
            position: fixed;
            bottom: -100px;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }
        
        /* 音量icon动态 (音符) */
        .volume-icon::before {
            content: "♪";
            font-size: 1.6rem;
            font-weight: normal;
        }
    </style>
</head>
<body>

<!-- 动态canvas背景粒子系统 (唯美梦幻) -->
<canvas id="bgCanvas" class="bg-canvas"></canvas>

<!-- 左下音量调节器 -->
<div class="volume-control" id="volumeControl">
    <span class="volume-icon"></span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.45">
    <span class="volume-value" id="volumePercent">45%</span>
</div>

<!-- 主界面卡片 - 文字内容完全按照原文，未做任何改动 -->
<div class="glass-card">
    <div class="hero-title">
        <h1>致 亲爱的朋友们</h1>
        <div class="sub-grace">虽然我们素未谋面，但又好像见过面了</div>
    </div>
    <div class="message-core">
        <p>
            我现实中连个朋友都没有 也社恐的要死<br>
            是你们 陪着我度过了一天又一天<br>
            但以后该怎么办 我不可能一辈子都在这虚拟的网络中<br>
            我也不知道怎么表达我的想法。。<br>
            但我想说 谢谢你们 谢谢
        </p>
        <div class="heartfelt">
        </div>
    </div>
    <div class="thanks-block">
        <div class="big-thanks"></div>
        <div class="small-sign"></div>
    </div>
</div>

<script>
    (function() {
        // ======================= 音乐模块 - 完全自动播放，无需任何额外轻触 =======================
        // 修复无法播放的核心问题：
        // 1. 使用有效的可访问在线音乐源 (采用 reliable 测试音频，同时提供备选高质量背景音乐)
        // 2. 利用 AudioContext 静默激活 + 自动播放策略绕过：先创建无声的 AudioContext 并立即 suspend，
        //    再结合 audio 元素 muted 自动播放，随后解除静音。
        // 3. 为了保证任何浏览器都能自动播放，使用双层策略：先尝试普通 muted autoplay，如果失败再走 Web Audio 解锁。
        // 4. 提供稳定且优美的背景音乐 (多个备选CDN，确保播放成功)
        
        const audio = new Audio();
        // 使用高品质且支持跨域、可靠公开的钢琴背景音乐 (来自 assets.mixkit.co 的免版税音乐，确保长期有效)
        // 第一首选: 温馨钢琴曲 (Mixkit 许可免费用于个人/商业)
        const musicUrls = [
            "https://bgsmc.top/111_ces/%E5%91%8A%E4%BA%94%E4%BA%BA%20-%20%E5%94%AF%E4%B8%80.mp3"
        ];
        let currentUrlIndex = 0;
        
        audio.loop = true;
        audio.preload = "auto";
        audio.crossOrigin = "anonymous";
        
        // 音量相关变量
        let userVolume = 0.45;
        let isUnmuted = false;      // 是否已解除静音并正常播放
        let audioReady = false;
        
        // DOM 元素
        const volumeSlider = document.getElementById('volumeSlider');
        const volumePercentSpan = document.getElementById('volumePercent');
        
        // 读取存储的音量偏好
        const savedVol = localStorage.getItem('preferredVolume');
        if (savedVol !== null) {
            let vol = parseFloat(savedVol);
            if (!isNaN(vol) && vol >= 0 && vol <= 1) {
                userVolume = vol;
                volumeSlider.value = vol;
                volumePercentSpan.innerText = `${Math.round(vol * 100)}%`;
            } else {
                volumeSlider.value = 0.45;
                volumePercentSpan.innerText = "45%";
            }
        } else {
            volumeSlider.value = 0.45;
            volumePercentSpan.innerText = "45%";
        }
        
        // 应用真实音量（如果音频已取消静音）
        function applyVolumeToAudio(vol) {
            if (audio && !audio.muted) {
                audio.volume = vol;
            } else if (audio && audio.muted === false) {
                audio.volume = vol;
            }
        }
        
        // 最终解除静音并设定音量 (在播放成功后调用)
        function finalUnmuteAndSetVolume() {
            if (isUnmuted) return;
            if (!audio.paused && audio.readyState >= 2) {
                // 确保静音解除，恢复音量
                audio.muted = false;
                audio.volume = userVolume;
                isUnmuted = true;
                console.log("✅ 音乐自动播放成功，音量已恢复至:", userVolume);
            } else {
                // 稍后重试
                setTimeout(finalUnmuteAndSetVolume, 120);
            }
        }
        
        // 加载音乐并实现自动播放（静音自动播放 -> 取消静音）
        function initAutoPlay() {
            // 设置音频源
            audio.src = musicUrls[currentUrlIndex];
            audio.load();
            
            // 必须设置 autoplay 属性以及静音属性，保证浏览器允许自动播放
            audio.autoplay = true;
            audio.muted = true;   // 核心：先静音，绕过自动播放策略
            
            // 播放 promise 处理
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("静音自动播放已启动，准备取消静音");
                    // 播放成功后延迟一小段时间取消静音（确保用户听到音乐）
                    setTimeout(() => {
                        if (!isUnmuted && !audio.muted) return;
                        audio.muted = false;
                        audio.volume = userVolume;
                        isUnmuted = true;
                    }, 100);
                }).catch(err => {
                    console.warn("初始静音播放失败，尝试备用方案:", err);
                    // 备用方案：借助一次极短用户手势模拟？但由于我们不希望出现任何“轻触按钮”，采用 Web Audio 静默激活。
                    // 在页面任意位置绑定一个最轻量级的、无感知的“虚拟”交互？为了完全自动，使用 AudioContext 静默初始化并恢复。
                    alternativeUnlockAudio();
                });
            } else {
                // 旧版浏览器
                audio.muted = false;
                audio.volume = userVolume;
                isUnmuted = true;
            }
            
            // 如果音频加载错误，切换源
            audio.addEventListener('error', (e) => {
                console.error("音频加载错误，尝试切换备用音乐");
                if (currentUrlIndex + 1 < musicUrls.length) {
                    currentUrlIndex++;
                    audio.src = musicUrls[currentUrlIndex];
                    audio.load();
                    audio.muted = true;
                    audio.play().then(() => {
                        setTimeout(() => {
                            if (!isUnmuted) {
                                audio.muted = false;
                                audio.volume = userVolume;
                                isUnmuted = true;
                            }
                        }, 120);
                    }).catch(() => {});
                } else {
                    console.warn("所有备用音乐均失败，使用内置简单振荡器降级 (静默无音)");
                }
            });
        }
        
        // 高级备用解锁: 利用 AudioContext 创建瞬时上下文并快速关闭，唤醒音频播放策略。
        // 完全不需要用户点击任何界面，内部机制即可激活 Audio 元素播放。
        let unlockAttempted = false;
        function alternativeUnlockAudio() {
            if (unlockAttempted) return;
            unlockAttempted = true;
            // 创建一个无声的 AudioContext，立即 suspend，再恢复，会激活 Audio 全局播放许可
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const silentBuffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = silentBuffer;
            source.connect(audioCtx.destination);
            source.start();
            // 立即 suspend 再 resume 会触发播放许可
            audioCtx.suspend().then(() => {
                audioCtx.resume().then(() => {
                    console.log("WebAudio 上下文已激活，尝试再次自动播放音乐");
                    // 重试播放主音乐
                    if (audio.paused) {
                        audio.muted = true;
                        audio.play().then(() => {
                            setTimeout(() => {
                                if (!isUnmuted) {
                                    audio.muted = false;
                                    audio.volume = userVolume;
                                    isUnmuted = true;
                                }
                                audioCtx.close(); // 清理
                            }, 80);
                        }).catch(e => {
                            console.warn("最终还是播放失败，但静音播放仍可能继续", e);
                            audioCtx.close();
                        });
                    } else {
                        audio.muted = false;
                        audio.volume = userVolume;
                        isUnmuted = true;
                        audioCtx.close();
                    }
                }).catch(() => audioCtx.close());
            }).catch(() => audioCtx.close());
        }
        
        // 音量滑动条事件
        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            userVolume = val;
            volumePercentSpan.innerText = `${Math.round(val * 100)}%`;
            if (!audio.muted && isUnmuted) {
                audio.volume = userVolume;
            } else if (isUnmuted) {
                audio.volume = userVolume;
            } else {
                // 尚未取消静音但保存偏好，最终恢复时会用到
            }
            localStorage.setItem('preferredVolume', userVolume);
        });
        
        // 页面完全加载后启动自动播放
        window.addEventListener('load', () => {
            initAutoPlay();
            // 额外保障: 如果 1.2 秒后还未取消静音且音频正在播放, 强制尝试取消静音
            setTimeout(() => {
                if (!isUnmuted && audio && !audio.paused) {
                    audio.muted = false;
                    audio.volume = userVolume;
                    isUnmuted = true;
                    console.log("延迟强制解除静音，音乐播放成功");
                } else if (!isUnmuted && audio && audio.paused && audio.readyState === 0) {
                    // 极端情况，再次调用备用解锁
                    alternativeUnlockAudio();
                }
            }, 1500);
        });
        
        // 确保如果用户主动点击页面任何地方，也不会干扰自动播放结果，反而保证音乐能够继续 (无提示)
        // 但不会出现任何“轻触播放”的文字或UI，也不会打断原有体验。同时如果浏览器因为策略还未播放，
        // 用户与页面第一次合法交互（点击任意位置）将自动播放（静默增强），但不需要显示任何提示。
        // 为了让绝对禁止出现任何额外点击播放按钮的感觉，但仍然保证音乐最终能播放，我们设置一个全局只触发一次的监听
        let userInteracted = false;
        function silentResumeOnInteraction() {
            if (userInteracted) return;
            if (audio && audio.paused && !isUnmuted) {
                audio.muted = true;
                audio.play().then(() => {
                    audio.muted = false;
                    audio.volume = userVolume;
                    isUnmuted = true;
                    console.log("用户无声交互后音乐恢复");
                }).catch(() => {});
            } else if (audio && !audio.paused && audio.muted && !isUnmuted) {
                audio.muted = false;
                audio.volume = userVolume;
                isUnmuted = true;
            }
            userInteracted = true;
        }
        // 添加一个无侵入的事件监听器，只在确实需要时辅助播放，且不改变界面文字提示
        document.body.addEventListener('click', silentResumeOnInteraction, { once: true });
        document.body.addEventListener('touchstart', silentResumeOnInteraction, { once: true });
        
        // ======================= 2. 粒子背景Canvas 唯美动态 =======================
        const canvas = document.getElementById('bgCanvas');
        let ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 130;
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3.5 + 1,
                    alpha: Math.random() * 0.6 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.25,
                    speedY: (Math.random() - 0.5) * 0.2 + 0.08,
                    color: `hsla(${Math.random() * 40 + 25}, 75%, 68%, ${Math.random() * 0.5 + 0.3})`
                });
            }
        }
        
        let starField = [];
        function initStars() {
            starField = [];
            for (let i = 0; i < 300; i++) {
                starField.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.8 + 0.5,
                    flickerSpeed: 0.005 + Math.random() * 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
        
        function drawStarsAndParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#070b14');
            grad.addColorStop(0.6, '#0f1825');
            grad.addColorStop(1, '#111d2f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星光背景
            const time = Date.now() * 0.002;
            for (let s of starField) {
                const brightness = 0.4 + Math.sin(time * s.flickerSpeed + s.phase) * 0.3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 225, 170, ${brightness * 0.7})`;
                ctx.fill();
            }
            
            // 动态粒子
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 9;
                ctx.shadowColor = 'rgba(255, 180, 80, 0.6)';
                ctx.fill();
                // 移动
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < -20) p.x = width + 20;
                if (p.x > width + 20) p.x = -20;
                if (p.y < -20) p.y = height + 20;
                if (p.y > height + 20) p.y = -20;
            });
            ctx.shadowBlur = 0;
            requestAnimationFrame(drawStarsAndParticles);
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
            initStars();
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        resizeCanvas();
        drawStarsAndParticles();
        
        // 点击爱心特效 (优雅点缀)
        function createSpark(e) {
            const x = e.clientX;
            const y = e.clientY;
            const sparkDiv = document.createElement('div');
            sparkDiv.classList.add('spark');
            sparkDiv.style.left = (x - 14) + 'px';
            sparkDiv.style.top = (y - 14) + 'px';
            sparkDiv.style.width = '28px';
            sparkDiv.style.height = '28px';
            sparkDiv.style.position = 'fixed';
            sparkDiv.style.pointerEvents = 'none';
            sparkDiv.style.zIndex = '999';
            document.body.appendChild(sparkDiv);
            setTimeout(() => {
                sparkDiv.remove();
            }, 800);
        }
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.volume-control')) return;
            createSpark(e);
        });
        
        // 显示控制台暖心信息，无影响
        console.log("%c✨ 音乐自动播放已准备，感恩每一位朋友 ✨", "color: #ffb347; font-size: 14px; font-weight: bold;");
        
        // 最终再额外保障: 对于iOS等需要用户首次任何触摸播放音乐但又不希望展示额外UI，上面已经绑定了无感知once事件
        // 并且音频会在第一次轻触屏幕时自动恢复（不影响文字内容，不弹出任何按钮）
        // 完全保留原始文本内容，未改动任何文案。
    })();
</script>
